name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skill-frontmatter:
    name: Validate SKILL.md frontmatter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check all SKILL.md files have required frontmatter
        run: |
          echo "Validating SKILL.md files..."
          FAILED=0

          for skill_file in .agents/skills/*/SKILL.md; do
            echo "Checking: $skill_file"

            if ! grep -q "^name:" "$skill_file"; then
              echo "  ❌ Missing 'name:' in $skill_file"
              FAILED=1
            fi

            if ! grep -q "^description:" "$skill_file"; then
              echo "  ❌ Missing 'description:' in $skill_file"
              FAILED=1
            fi

            if ! grep -q "framework: genesis" "$skill_file"; then
              echo "  ❌ Missing 'framework: genesis' in $skill_file"
              FAILED=1
            fi

            echo "  ✅ $skill_file"
          done

          if [ $FAILED -ne 0 ]; then
            echo "Validation failed!"
            exit 1
          fi

          echo "All SKILL.md files are valid!"

  check-install-scripts:
    name: Validate install scripts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check install.sh syntax
        run: bash -n install.sh && echo "✅ install.sh syntax OK"

      - name: Check all genesis agents are in README
        run: |
          echo "Checking README covers all agents..."
          for agent in .agents/skills/genesis*/; do
            name=$(basename "$agent")
            if ! grep -q "$name" README.md; then
              echo "❌ $name not mentioned in README.md"
              exit 1
            fi
            echo "✅ $name"
          done
